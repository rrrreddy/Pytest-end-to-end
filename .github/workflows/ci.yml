name: CI Pipeline

on:
  push:
    branches:
      - dev
      - uat
      - prod

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install requests pandas pytest
      - name: Run tests
        run: |
          pytest test_main.py
      - name: Branch promotion check
        if: github.ref == 'refs/heads/dev'
        run: echo "Ready for UAT promotion"
      - name: Branch promotion check
        if: github.ref == 'refs/heads/uat'
        run: echo "Ready for PROD promotion"
